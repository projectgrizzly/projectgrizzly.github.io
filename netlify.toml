[build]
  publish = "."

# Serve submit form at root
[[redirects]]
  from = "/"
  to = "/submit.html"
  status = 200
  force = true

# Clean URL for submit
[[redirects]]
  from = "/submit"
  to = "/submit.html"
  status = 200
  force = true

# Clean URL for admin dashboard
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
  force = true

# Catch-all — send unknown routes to submit form
[[redirects]]
  from = "/*"
  to = "/submit.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
